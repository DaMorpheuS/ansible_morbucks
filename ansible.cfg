[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False

# YAML-formatted task output (modern equivalent of the old `yaml` callback,
# which was removed from community.general).
stdout_callback = default
callback_result_format = yaml
bin_ansible_callbacks = True

# Role path configuration
roles_path = ./roles

# Fact caching configuration
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_morbucks
fact_caching_timeout = 86400

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
