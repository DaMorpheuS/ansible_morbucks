---
# Host-specific overrides for morbucks.
#
# Tune PostgreSQL to the box's resources here if you like, e.g.:
# postgres_shared_buffers: "512MB"
#
# Allow LAN admin access to PostgreSQL (still off the public internet):
# postgres_listen_addresses: "localhost,192.168.100.60"
# postgres_extra_hba_cidrs:
#   - "192.168.100.0/24"

# --- Mail (Postfix local relay) ---
# For better outbound deliverability, set a real FQDN with a matching PTR:
# mail_myhostname: "mail.machteldbakker.nl"
# Route outbound through a provider instead of direct-to-MX:
# mail_relayhost: "[smtp.provider.com]:587"
