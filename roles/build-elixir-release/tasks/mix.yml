---
# Build the production release with mix. All commands run in the mix project
# dir (= the repo root, or app_vars.subdir within it for a monorepo) so asdf
# shims resolve the versions from .tool-versions at the repo root.

- name: Install hex locally
  command: "mix local.hex --force"
  args:
    chdir: "{{ mix_project_dir }}"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"
  changed_when: true

- name: Install rebar locally
  command: "mix local.rebar --force"
  args:
    chdir: "{{ mix_project_dir }}"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"
  changed_when: true

- name: Fetch dependencies for {{ mix_env }}
  command: "mix deps.get --only {{ mix_env }}"
  args:
    chdir: "{{ mix_project_dir }}"
    creates: "{{ mix_project_dir }}/deps"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"

- name: Compile application
  command: "mix compile"
  args:
    chdir: "{{ mix_project_dir }}"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"

- name: Setup assets tooling
  command: "mix assets.setup"
  args:
    chdir: "{{ mix_project_dir }}"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"

- name: Build and digest assets
  command: "mix assets.deploy"
  args:
    chdir: "{{ mix_project_dir }}"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"

- name: Build release
  command: "mix release"
  args:
    chdir: "{{ mix_project_dir }}"
  environment: "{{ asdf_env | combine({'MIX_ENV': mix_env}) }}"
