---
# Build an Elixir release on this machine, as the unprivileged build user.

- name: Ensure build base directory exists
  file:
    path: "{{ elixir_release_build_base_dir }}"
    state: directory
    mode: '0750'

- name: Set build directory facts
  set_fact:
    # The repo is always cloned at elixir_release_build_dir. For a monorepo the
    # mix project lives in a subdirectory (app_vars.subdir); mix runs in
    # mix_project_dir, while git clone and asdf (.tool-versions at the repo
    # root) operate on elixir_release_build_dir. Without a subdir the two are
    # identical, so single-repo apps are unaffected.
    elixir_release_build_dir: "{{ elixir_release_build_base_dir }}/{{ app }}-{{ tag }}"
    mix_project_dir: "{{ elixir_release_build_base_dir }}/{{ app }}-{{ tag }}{{ ('/' ~ (app_vars.subdir | default(''))) if (app_vars.subdir | default('')) | length > 0 else '' }}"

- name: Clone/checkout the application repository
  include_tasks: git.yml

- name: Install language versions from .tool-versions
  include_tasks: asdf.yml

- name: Compile and build the release
  include_tasks: mix.yml

- name: Archive the release artifact
  include_tasks: archive.yml
