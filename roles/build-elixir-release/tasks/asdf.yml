---
# Install exactly the tool versions the project pins in .tool-versions.
#
# We deliberately do NOT parse .tool-versions ourselves (line-splitting inside a
# templated var is fragile across ansible versions). Instead we ensure the
# standard plugins exist and let `asdf install` (no args) read the file and
# install every tool/version it lists.

- name: Check for .tool-versions
  stat:
    path: "{{ elixir_release_build_dir }}/.tool-versions"
  register: tool_versions_file

- name: Ensure standard asdf plugins are present
  command: "asdf plugin add {{ item }}"
  args:
    creates: "{{ asdf_data_dir }}/plugins/{{ item }}"
  environment: "{{ asdf_env }}"
  loop: "{{ asdf_build_plugins }}"
  when: tool_versions_file.stat.exists

- name: Install all pinned tool versions from .tool-versions (compiles Erlang - can take minutes)
  command: "asdf install"
  args:
    chdir: "{{ elixir_release_build_dir }}"
  environment: "{{ asdf_env }}"
  when: tool_versions_file.stat.exists

- name: Warn when no .tool-versions is present
  debug:
    msg: "No .tool-versions in {{ elixir_release_build_dir }} - skipping asdf install (build uses whatever is on PATH)."
  when: not tool_versions_file.stat.exists
