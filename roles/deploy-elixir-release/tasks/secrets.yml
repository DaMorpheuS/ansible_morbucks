---
# Derive database credentials and generate/persist per-app secrets ON the box,
# so app_vars never has to contain secrets (and can be committed publicly).
#
# - DB name/user/password default to "<app>_<env>"; the DB listens on loopback
#   only, so predictable credentials are acceptable.
# - secret_key_base and admin_password are generated on first deploy and read
#   back on later deploys (the `password` lookup persists them to a file). They
#   live outside the release directory so a redeploy never regenerates them.
#
# Run the deploy as root (the secrets dir is root-owned, mode 0700).

- name: Set app secrets directory
  set_fact:
    app_secrets_dir: "{{ release_base_dir }}/.secrets/{{ env }}/{{ app }}"

- name: Ensure app secrets directory exists (root, private)
  file:
    path: "{{ app_secrets_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Derive database credentials (predictable; DB is loopback-only)
  set_fact:
    database_name: "{{ app_vars.environments[env].database_name | default(app ~ '_' ~ env) }}"
    database_user: "{{ app_vars.environments[env].database_user | default(app ~ '_' ~ env) }}"
    database_password: "{{ app_vars.environments[env].database_password | default(app ~ '_' ~ env) }}"

- name: Generate or read persisted secret_key_base
  set_fact:
    secret_key_base: "{{ lookup('password', app_secrets_dir + '/secret_key_base chars=ascii_letters,digits length=64') }}"

- name: Generate or read persisted admin_password
  set_fact:
    admin_password: "{{ lookup('password', app_secrets_dir + '/admin_password chars=ascii_letters,digits length=20') }}"

- name: Report secret locations and current admin password
  debug:
    msg:
      - "Secrets persisted in {{ app_secrets_dir }} (edit those files + redeploy to change them)."
      - "Admin password for {{ app }} ({{ env }}): {{ admin_password }}"
