---
- name: Set system timezone to UTC
  command: timedatectl set-timezone UTC
  changed_when: false

- name: Ensure locales package is installed
  apt:
    name: locales
    state: present
    update_cache: true

- name: Ensure en_US.UTF-8 locale is enabled
  lineinfile:
    path: /etc/locale.gen
    regexp: '^#?\s*en_US\.UTF-8'
    line: 'en_US.UTF-8 UTF-8'
    state: present
  register: locale_gen_file

- name: Generate locales if changed
  command: locale-gen
  when: locale_gen_file.changed
