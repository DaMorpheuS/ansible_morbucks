---
- name: Install systemd unit for the app
  template:
    src: systemd.service.j2
    dest: "/etc/systemd/system/{{ app }}_{{ env }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: Restart elixir service

- name: Enable the service (and reload systemd)
  systemd:
    name: "{{ app }}_{{ env }}"
    enabled: yes
    daemon_reload: yes

- name: Ensure the service is started
  systemd:
    name: "{{ app }}_{{ env }}"
    state: started
