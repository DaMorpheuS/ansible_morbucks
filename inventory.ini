# Inventory for the all-in-one "morbucks" server.
#
# There are two ways this project is used:
#
#   1. PROVISIONING (playbooks/provision.yml) is run FROM your workstation and
#      targets the `morbucks` host over SSH (as root). This installs the base
#      system, the build toolchain, PostgreSQL and Caddy.
#
#   2. BUILD + DEPLOY (playbooks/build-elixir-release.yml and
#      playbooks/deploy-elixir-release.yml) are run ON morbucks itself with a
#      local connection (hosts: localhost). They do NOT use this inventory host.
#
# So: provision from your laptop, then build/deploy from the box.

[morbucks_server]
morbucks ansible_host=morbucks ansible_user=root

[morbucks_server:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no
